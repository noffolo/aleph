run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gocritic
    - gosec

linters:
  settings:
    gosec:
      excludes:
        - G104  # error not checked — too many in codebase
        - G404  # weak rand — used for non-crypto
        - G301  # file permissions — DuckDB operations
        - G307  # defer file close

issues:
  exclude-rules:
    - path: "_test\\.go$"
      linters:
        - gosec
    - path: "internal/tools/"
      linters:
        - gosec
    - path: "cmd/"
      linters:
        - gosec