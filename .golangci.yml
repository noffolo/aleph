version: "2"
run:
  timeout: 5m
linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gocritic
    - gosec
  settings:
    gosec:
      exclude:
        - G104
        - G404
        - G301
        - G307
issues:
  exclude-rules:
    - path: "_test\\.go$"
      linters:
        - gosec
