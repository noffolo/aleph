server {
    listen 80;
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }
    # Proxy API requests
    location /aleph.v1 {
        proxy_pass http://aleph-backend:8080;
    }
    location /connect {
        proxy_pass http://aleph-backend:8080;
    }
}
