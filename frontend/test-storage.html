<!DOCTYPE html>
<html>
<head>
    <title>SessionStorage Test</title>
    <script>
        function testSessionStorage() {
            // Clear previous test data
            sessionStorage.removeItem('aleph:commandHistory');
            
            // Test 1: Initial empty
            const initial = sessionStorage.getItem('aleph:commandHistory');
            console.log('Test 1 - Initial empty:', initial);
            
            // Test 2: Save some data
            const testHistory = ['/explore', '/help', '/agent list'];
            sessionStorage.setItem('aleph:commandHistory', JSON.stringify(testHistory));
            
            // Test 3: Retrieve data
            const retrieved = sessionStorage.getItem('aleph:commandHistory');
            const parsed = JSON.parse(retrieved);
            console.log('Test对我们 - Retrieved:', parsed);
            
            // Test 4: Reset navigation function clears localStorage?
            const reset = [];
            sessionStorage.setItem('aleph:commandHistory', JSON.stringify(reset));
            
            const afterReset = sessionStorage.getItem('aleph:commandHistory');
            console.log('Test 4 - After reset:', afterReset);
            
            // Clean up
            sessionStorage.removeItem('aleph:commandHistory');
            
            document.getElementById('output').innerHTML = 
                '<h3>SessionStorage Tests:</h3>' +
                '<p>Test 1: ' + (initial === null ? '✓ Empty' : '✗ Not empty') + '</p>' +
                '<p>Test 2-3: ' + (parsed && parsed.length === 3 ? '✓ Stored 3 commands' : '✗ Failed') + '</p>' +
                '<p>Test 4: ' + (JSON.parse(afterReset || '[]').length === 0 ? '✓ Reset cleared' : '✗ Reset failed') + '</p>';
        }
        
        function checkSSR() {
            const hasWindow = typeof window !== 'undefined';
            document.getElementById('ssr').innerHTML = 
                '<h3>SSR Safety:</h3>' +
                '<p>typeof window check: ' + (hasWindow ? '✓ Window exists' : '✗ No window (SSR)') + '</p>' +
                '<p>sessionStorage exists: ' + (hasWindow && typeof sessionStorage !== 'undefined' ? '✓ Available' : '✗ Not available') + '</p>';
        }
        
        window.onload = function() {
            testSessionStorage();
            checkSSR();
        };
    </script>
</head>
<body>
    <h1>SessionStorage Test for Phase 13</h1>
    <div id="output"></div>
    <div id="ssr"></div>
</body>
</html>
