[build]
cmd = "go build -o ./tmp/aleph main.go"
bin = "./tmp/aleph"
args_bin = []
delay = 1000
exclude_dir = ["vendor", ".git", "node_modules", "frontend", "nlp", "tmp", "dist"]
exclude_file = []
exclude_regex = ["_test\\.go"]
exclude_unchanged = true
follow_symlink = false
full_bin = ""
include_dir = ["internal", "cmd"]
include_ext = ["go", "tpl", "tmpl", "html"]
include_file = []
kill_delay = 500
log = "tmp/build-errors.log"
send_interrupt = true
stop_on_error = false
rerun = true
rerun_delay = 500
polling_interval = 0
poll = 0

[log]
time = false
main_only = false

[misc]
clean_on_exit = false

[screen]
clear_on_rebuild = false
keep_scroll = true

[proxy]
enabled = false
proxy_port = 8090
app_port = 8080

[environment]
