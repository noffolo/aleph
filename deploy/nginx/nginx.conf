# Aleph-v2 NGINX Reverse Proxy with TLS Termination
# --------------------------------------------------
# Place in: /etc/nginx/nginx.conf or /etc/nginx/conf.d/aleph.conf
# Required: ssl_certificate + ssl_certificate_key (set via env vars or hardcode)
# Env vars used: SSL_CERT_PATH, SSL_KEY_PATH, BACKEND_PORT (default 8080)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json text/css application/javascript;

    # --- Rate Limiting Zones ---
    # Zone "auth": 10MB shared memory, 5 requests/minute per IP on session endpoints
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    # Zone "api": 10MB shared memory, 30 requests/second for general API
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # --- Upstream (Go Backend) ---
    upstream aleph_backend {
        server localhost:8080;
        keepalive 32;
    }

    # --- HTTP → HTTPS Redirect ---
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # --- HTTPS Server ---
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS configuration — update paths to your certificates before deploying
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        # --- Session / Auth Endpoints (Rate Limited) ---
        location /api/v1/auth/ {
            proxy_pass http://aleph_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            limit_req zone=auth burst=3 nodelay;
        }

        # --- SSE / Events (WebSocket Upgrade Support) ---
        location /api/v1/events {
            proxy_pass http://aleph_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }

        # --- General API ---
        location /api/ {
            proxy_pass http://aleph_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            limit_req zone=api burst=10 nodelay;
        }

        # --- Health Check (no rate limit, proxies to backend /api/v1/healthz) ---
        location /healthz {
            proxy_pass http://aleph_backend/api/v1/healthz;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }

        # --- Root / Static ---
        location / {
            proxy_pass http://aleph_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
