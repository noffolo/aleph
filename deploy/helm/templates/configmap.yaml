apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aleph-v2.fullname" . }}-backend
  labels:
    {{- include "aleph-v2.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  DUCKDB_PATH: {{ .Values.backend.env.DUCKDB_PATH | quote }}
  NLP_ADDR: {{ printf "%s-nlp-sidecar:%d" (include "aleph-v2.fullname" .) (int .Values.nlp.service.port) | quote }}
  OLLAMA_BASE_URL: {{ printf "http://%s-ollama:%d" (include "aleph-v2.fullname" .) (int .Values.ollama.service.port) | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.backend.env.CORS_ALLOWED_ORIGINS | default "*" | quote }}
  DATA_ROOT: {{ .Values.backend.env.DATA_ROOT | default "/data" | quote }}
  BACKUP_DIR: {{ .Values.backend.env.BACKUP_DIR | default "/data/backups" | quote }}
  BACKUP_INTERVAL: {{ .Values.backend.env.BACKUP_INTERVAL | default "6h" | quote }}
  RATE_LIMIT_REQUESTS_PER_SECOND: {{ .Values.backend.env.RATE_LIMIT_REQUESTS_PER_SECOND | default "100" | quote }}
  RATE_LIMIT_BURST: {{ .Values.backend.env.RATE_LIMIT_BURST | default "200" | quote }}
  LLM_TIMEOUT_SECONDS: {{ .Values.backend.env.LLM_TIMEOUT_SECONDS | default "120" | quote }}
