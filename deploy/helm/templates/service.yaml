{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aleph-v2.fullname" . }}-backend
  labels:
    {{- include "aleph-v2.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "aleph-v2.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
---
{{- end }}
{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aleph-v2.fullname" . }}-frontend
  labels:
    {{- include "aleph-v2.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "aleph-v2.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
---
{{- end }}
{{- if .Values.nlp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aleph-v2.fullname" . }}-nlp-sidecar
  labels:
    {{- include "aleph-v2.labels" . | nindent 4 }}
    app.kubernetes.io/component: nlp-sidecar
spec:
  type: {{ .Values.nlp.service.type }}
  ports:
    - port: {{ .Values.nlp.service.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "aleph-v2.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nlp-sidecar
---
{{- end }}
{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aleph-v2.fullname" . }}-postgres
  labels:
    {{- include "aleph-v2.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: {{ .Values.postgres.service.type }}
  ports:
    - port: {{ .Values.postgres.service.port }}
      targetPort: postgresql
      protocol: TCP
      name: postgresql
  selector:
    {{- include "aleph-v2.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
---
{{- end }}
{{- if .Values.ollama.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aleph-v2.fullname" . }}-ollama
  labels:
    {{- include "aleph-v2.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  type: {{ .Values.ollama.service.type }}
  ports:
    - port: {{ .Values.ollama.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "aleph-v2.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
{{- end }}
