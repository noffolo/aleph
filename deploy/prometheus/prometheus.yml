global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "aleph-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - aleph-backend:8080
        labels:
          service: "aleph-v2"
          env: "production"

  - job_name: "prometheus"
    static_configs:
      - targets:
          - localhost:9090