global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://localhost:5001/alerts"
        send_resolved: true

  - name: "critical"
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#aleph-alerts"
        title: "{{ .CommonAnnotations.summary }}"
        text: "{{ .CommonAnnotations.description }}"
        send_resolved: true
    email_configs:
      - to: "${ONCALL_EMAIL}"
        from: "alertmanager@aleph.local"
        smarthost: "smtp:25"
        headers:
          Subject: "[CRITICAL] {{ .CommonAnnotations.summary }}"