global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h

receivers:
  - name: "default"
    # Configure webhook/email/slack for your environment
    # Example: webhook_configs:
    #   - url: "http://localhost:5001/alerts"
    #     send_resolved: true

  - name: "critical"
    # Example: email_configs:
    #   - to: "oncall@example.com"
    #     from: "alertmanager@aleph.local"
    #     smarthost: "smtp:25"