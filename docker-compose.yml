secrets:
  key_encryption_key:
    file: ./secrets/key_encryption_key.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  postgres_dsn:
    file: ./secrets/postgres_dsn.txt
  aleph_api_key_secret_backend:
    file: ./secrets/aleph_api_key_secret_backend.txt
  aleph_api_key_secret:
    file: ./secrets/aleph_api_key_secret.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt

services:
  aleph-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aleph-backend
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: ["./aleph"]
    environment:
      DUCKDB_PATH: /app/data/aleph.duckdb
      PYTHON_CMD: python3
      GO_CMD: go
      SERVER_ADDRESS: ":8080"
      # POSTGRES_DSN — loaded from Docker secret
      POSTGRES_DSN_FILE: /run/secrets/postgres_dsn
      # JWT_SECRET — loaded from Docker secret
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      # ALEPH_API_KEY_SECRET_BACKEND — loaded from Docker secret
      ALEPH_API_KEY_SECRET_BACKEND_FILE: /run/secrets/aleph_api_key_secret_backend
      NLP_ADDR: "aleph-python-sidecar:8001"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    secrets:
      - key_encryption_key
      - jwt_secret
      - postgres_dsn
      - aleph_api_key_secret_backend
    ports:
      - "8081:8080"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    volumes:
      - ./aleph_tools:/app/aleph_tools
      - aleph-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      aleph-db:
        condition: service_healthy

  # Ollama runs on the host (not in Docker). Backend connects via host.docker.internal.
  aleph-python-sidecar:
    build:
      context: ./nlp
      dockerfile: Dockerfile
    container_name: aleph-nlp-sidecar
    user: aleph
    environment:
      GRPC_SERVER_ADDRESS: 0.0.0.0:8001
      ALEPH_DUCKDB_PATH: /data/aleph.duckdb
    secrets:
      - aleph_api_key_secret
    ports:
      - "8001:8001"
    volumes:
      - ./nlp/models:/app/onnx_model
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; channel=grpc.insecure_channel('localhost:8001'); stub=grpc.channel_ready_future(channel); stub.result(timeout=5); print('healthy')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    depends_on:
      aleph-db:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  aleph-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aleph-frontend
    environment:
      VITE_API_BASE_URL: http://aleph-backend:8080
      ALEPH_REGISTRY_URL: http://aleph-backend:8080
    ports:
      - "5174:80"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      aleph-backend:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # SECURITY: PostgreSQL binds to localhost only (container-internal).
  # Backend connects via Docker DNS (aleph-db:5432), not host port.
  # Host port removed — you have PostgreSQL running locally.
  aleph-db:
    image: postgres:16-alpine
    container_name: aleph-db
    command: ["postgres", "-c", "listen_addresses=*"]
    environment:
      POSTGRES_DB: aleph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - aleph-pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aleph"]
      interval: 5s
      timeout: 5s
      retries: 5

  aleph-pg-backup:
    image: postgres:16-alpine
    container_name: aleph-pg-backup
    profiles:
      - backup
    environment:
      PGHOST: aleph-db
      PGPORT: 5432
      PGUSER: postgres
      PGDATABASE: aleph
    volumes:
      - ./scripts/backup-pg.sh:/backup-pg.sh:ro
      - ./backups/postgres:/backups/postgres
    entrypoint: >
      /bin/sh -c "
        if [ -f /run/secrets/postgres_password ]; then
          export PGPASSWORD="$$(cat /run/secrets/postgres_password | tr -d '\n')";
        fi;
        echo 'PostgreSQL Backup Service starting...';
        while true; do
          /backup-pg.sh;
          echo 'Next backup in 24 hours...';
          sleep 86400;
        done
      "
    depends_on:
      aleph-db:
        condition: service_healthy
    secrets:
      - postgres_password

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: aleph-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - aleph-backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  grafana:
    image: grafana/grafana:11.2.0
    container_name: aleph-grafana
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/aleph-overview.json
    ports:
      - "3001:3000"
    volumes:
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    secrets:
      - grafana_admin_password
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: aleph-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

volumes:
  aleph-data:
  aleph-pgdata:
  prometheus-data:
  grafana-data:
  alertmanager-data:

networks:
  default:
    name: aleph-network
