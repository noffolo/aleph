services:
  aleph-backend:
    build:
      context: .
      dockerfile: cmd/aleph-server/Dockerfile
    container_name: aleph-backend
    environment:
      REGISTRY_DB_PATH: /app/aleph_registry.duckdb
      PYTHON_CMD: python3
      GO_CMD: go
      SERVER_ADDRESS: :8080
      ALEPH_API_KEY_SECRET_BACKEND: "dev_backend_secret_key"
    ports:
      - "8080:8080"
    volumes:
      # - ./aleph_registry.duckdb:/app/aleph_registry.duckdb
      - ./aleph_tools:/app/aleph_tools
    depends_on:
      aleph-registry-db:
        condition: service_started

  aleph-python-sidecar:
    build:
      context: ./nlp
      dockerfile: Dockerfile
    container_name: aleph-nlp-sidecar
    environment:
      GRPC_SERVER_ADDRESS: 0.0.0.0:8001
      ALEPH_API_KEY_SECRET: "dev_sidecar_secret_key"
    ports:
      - "8001:8001"
    volumes:
      - ./nlp/models:/app/onnx_model
    depends_on:
      aleph-backend:
        condition: service_started

  aleph-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aleph-frontend
    environment:
      VITE_API_BASE_URL: http://aleph-backend:8080
      ALEPH_REGISTRY_URL: http://aleph-backend:8080
    ports:
      - "5174:80"
    depends_on:
      aleph-backend:
        condition: service_started

  aleph-registry-db:
    image: alpine:latest
    container_name: aleph-registry-db
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - ./aleph_registry.duckdb:/data/aleph_registry.duckdb

networks:
  default:
    name: aleph-network
