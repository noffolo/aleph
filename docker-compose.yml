services:
  aleph-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aleph-backend
    environment:
      POSTGRES_DSN: "${POSTGRES_DSN}"
      DUCKDB_PATH: /app/aleph_registry.duckdb
      PYTHON_CMD: python3
      GO_CMD: go
      SERVER_ADDRESS: ":8080"
      ALEPH_API_KEY_SECRET_BACKEND: "${ALEPH_API_KEY_SECRET_BACKEND}"
      NLP_ADDR: "aleph-nlp-sidecar:8001"
      OLLAMA_BASE_URL: "http://ollama:11434"
      KEY_ENCRYPTION_KEY: "${KEY_ENCRYPTION_KEY}"
    ports:
      - "8080:8080"
    volumes:
      - ./aleph_tools:/app/aleph_tools
      - aleph-data:/app/data
      - aleph-duckdb:/app/aleph_registry.duckdb
    depends_on:
      aleph-db:
        condition: service_healthy
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    container_name: aleph-ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 2 && ollama pull llama3 && ollama pull nomic-embed-text && wait"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  aleph-python-sidecar:
    build:
      context: ./nlp
      dockerfile: Dockerfile
    container_name: aleph-nlp-sidecar
    user: aleph
    environment:
      GRPC_SERVER_ADDRESS: 0.0.0.0:8001
      ALEPH_API_KEY_SECRET: "${ALEPH_API_KEY_SECRET}"
      ALEPH_DUCKDB_PATH: /data/aleph.duckdb
    ports:
      - "8001:8001"
    volumes:
      - ./nlp/models:/app/onnx_model
      - ./data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; channel=grpc.insecure_channel('localhost:8001'); stub=grpc.channel_ready_future(channel); stub.result(timeout=5); print('healthy')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    depends_on:
      aleph-db:
        condition: service_started

  aleph-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aleph-frontend
    environment:
      VITE_API_BASE_URL: http://aleph-backend:8080
      ALEPH_REGISTRY_URL: http://aleph-backend:8080
    ports:
      - "5174:80"
    depends_on:
      aleph-backend:
        condition: service_started

  aleph-db:
    image: postgres:16-alpine
    container_name: aleph-db
    environment:
      POSTGRES_DB: aleph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "5432:5432"
    volumes:
      - aleph-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aleph"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  aleph-pgdata:
  aleph-data:
  aleph-duckdb:
  ollama-models:

networks:
  default:
    name: aleph-network
