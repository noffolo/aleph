services:
  aleph-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aleph-backend
    environment:
      POSTGRES_DSN: "${POSTGRES_DSN}"
      DUCKDB_PATH: /app/aleph_registry.duckdb
      PYTHON_CMD: python3
      GO_CMD: go
      SERVER_ADDRESS: ":8080"
      ALEPH_API_KEY_SECRET_BACKEND: "${ALEPH_API_KEY_SECRET_BACKEND}"
      NLP_ADDR: "aleph-nlp-sidecar:8001"
      KEY_ENCRYPTION_KEY: "${KEY_ENCRYPTION_KEY}"
    ports:
      - "8080:8080"
    volumes:
      - ./aleph_tools:/app/aleph_tools
      - aleph-data:/app/data
      - aleph-duckdb:/app/aleph_registry.duckdb
    depends_on:
      aleph-db:
        condition: service_healthy

  aleph-python-sidecar:
    build:
      context: ./nlp
      dockerfile: Dockerfile
    container_name: aleph-nlp-sidecar
    environment:
      GRPC_SERVER_ADDRESS: 0.0.0.0:8001
      ALEPH_API_KEY_SECRET: "${ALEPH_API_KEY_SECRET}"
    ports:
      - "8001:8001"
    volumes:
      - ./nlp/models:/app/onnx_model
    depends_on:
      aleph-backend:
        condition: service_started

  aleph-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aleph-frontend
    environment:
      VITE_API_BASE_URL: http://aleph-backend:8080
      ALEPH_REGISTRY_URL: http://aleph-backend:8080
    ports:
      - "5174:80"
    depends_on:
      aleph-backend:
        condition: service_started

  aleph-db:
    image: postgres:16-alpine
    container_name: aleph-db
    environment:
      POSTGRES_DB: aleph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "5432:5432"
    volumes:
      - aleph-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aleph"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  aleph-pgdata:
  aleph-data:
  aleph-duckdb:

networks:
  default:
    name: aleph-network
