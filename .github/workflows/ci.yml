name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggering

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '20'

jobs:
  go-backend:
    name: Go Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Set GOTOOLCHAIN
        run: echo "GOTOOLCHAIN=local" >> $GITHUB_ENV

      - name: Verify Go module
        run: go mod download && go mod verify

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          working-directory: ./

      - name: Run Go tests with race detector (no cache)
        run: |
          set -o pipefail
          go test -race -count=1 ./... 2>&1 | tee test-output.txt

      - name: Run go vet
        run: go vet ./...

      - name: Run govulncheck (Go vulnerability scan)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Upload test results (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-results
          path: test-output.txt

      - name: Build Go binary
        run: go build -o aleph ./main.go

      - name: Verify binary exists
        run: test -f ./aleph && echo "Binary exists"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit (high severity gate)
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Check ESLint config exists
        working-directory: frontend
        run: test -f eslint.config.js && echo "ESLint config present"

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run vitest
        run: npx vitest run
        working-directory: frontend
        env:
          CI: true

      - name: Build frontend (quiet)
        run: npm run build -- --logLevel error
        working-directory: frontend

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: frontend

  contract-tests:
    name: Contract Tests (Go ↔ Python NLP)
    runs-on: ubuntu-latest
    needs: [go-backend, frontend]

    env:
      NLP_SIDECAR_ADDR: localhost:8001

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Set GOTOOLCHAIN
        run: echo "GOTOOLCHAIN=local" >> $GITHUB_ENV

      - name: Start NLP sidecar
        run: docker compose up -d aleph-python-sidecar

      - name: Wait for sidecar to be healthy
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 8001 2>/dev/null; then
              echo "Sidecar ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Sidecar did not start in time"
          docker compose logs aleph-python-sidecar
          exit 1

      - name: Run Go contract tests
        run: go test -tags=contract -v -count=1 ./internal/nlp/...

      - name: Stop sidecar
        if: always()
        run: docker compose down aleph-python-sidecar

  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [go-backend, frontend, contract-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build . --tag aleph-v2:ci --progress=plain

      - name: Verify Docker Compose
        run: docker compose config

      - name: Trivy container vulnerability scan
        run: |
          docker run --rm aquasec/trivy image --severity=CRITICAL --exit-code=1 aleph-v2:ci

      - name: Save Docker image metadata
        run: |
          echo "Image built successfully at $(date)" > docker-metadata.txt
          docker images aleph-v2:ci >> docker-metadata.txt

      - name: Upload Docker metadata
        uses: actions/upload-artifact@v4
        with:
          name: docker-metadata
          path: docker-metadata.txt

  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: docker
    # Only push to registry on pushes to main (not on PRs or workflow_dispatch)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/aleph-v2
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [go-backend, frontend, contract-tests, docker, docker-push]
    
    steps:
      - name: Check CI status
        run: |
          echo "CI Pipeline completed"
          echo "Go Backend: ${{ needs.go-backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Contract Tests: ${{ needs.contract-tests.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          
          if [[ "${{ needs.go-backend.result }}" == "failure" ]]; then
            echo "⚠️ Go Backend tests may be failing - check test outputs"
          fi
