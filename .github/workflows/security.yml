name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'

jobs:
  # ────────────────────────────────────────────────────────────
  # 1 · Gitleaks — secrets detection
  # ────────────────────────────────────────────────────────────
  gitleaks:
    name: Gitleaks (Secrets Detection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ────────────────────────────────────────────────────────────
  # 2 · govulncheck — Go vulnerability scan
  # ────────────────────────────────────────────────────────────
  govulncheck:
    name: govulncheck (Go Vulnerabilities)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan Go vulnerabilities
        run: govulncheck ./...

  # ────────────────────────────────────────────────────────────
  # 3 · npm audit — frontend dependency audit
  # ────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit (Frontend Dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit dependencies (fail on HIGH/CRITICAL)
        working-directory: frontend
        run: npm audit --audit-level=high

  # ────────────────────────────────────────────────────────────
  # 4 · Trivy — Docker image vulnerability scan
  # ────────────────────────────────────────────────────────────
  trivy:
    name: Trivy (Docker Image Scan)
    runs-on: ubuntu-latest
    needs: [gitleaks, govulncheck, npm-audit]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build . --tag aleph-v2:security-scan --progress=plain

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: aleph-v2:security-scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  # ────────────────────────────────────────────────────────────
  # Summary
  # ────────────────────────────────────────────────────────────
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, govulncheck, npm-audit, trivy]
    if: always()
    steps:
      - run: |
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | ${{ needs.gitleaks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| govulncheck | ${{ needs.govulncheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| npm audit | ${{ needs.npm-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.trivy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "❌ **One or more security scans failed.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **All security scans passed.**" >> $GITHUB_STEP_SUMMARY
          fi
