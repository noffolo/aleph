name: Deploy

on:
  push:
    tags: ['v*']

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'

jobs:
  verify:
    name: Pre-Deploy Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum
      
      - name: Go vet + build
        run: |
          go vet ./...
          go build ./...
      
      - name: Go test (race detector)
        run: |
          set -o pipefail
          go test -race -count=1 ./... 2>&1 | tee test-output.txt
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Frontend type-check + build
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit
          npx vite build

  deploy:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/aleph-v2
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy notification
        run: |
          echo "Deploy triggered for ${{ github.ref }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
